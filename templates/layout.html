<!DOCTYPE html>
<html>

<head>

<title>Signature Verification System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script>
if(localStorage.getItem("theme")=="dark"){
document.documentElement.classList.add("dark-mode");
}
</script>

<style>

/* BODY */
body{
background:white; /* ✅ white background */
font-family:Arial;
transition:0.4s;
}

/* SIDEBAR */

.sidebar{
height:100vh;
background:linear-gradient(180deg,#0f172a,#1e293b);
position:fixed;
width:220px;
padding-top:20px;
transition:0.3s;
}

.sidebar.hide{
margin-left:-220px;
}

/* LOGO BUTTON */

.logo{
text-align:center;
margin-bottom:20px;
cursor:pointer;
}

.logo img{
width:65px;
height:65px;
border-radius:50%;
border:3px solid white;
}

.logo h5{
color:white;
margin-top:8px;
}

/* SIDEBAR LINKS */

.sidebar a{
display:block;
color:#cbd5e1;
padding:12px 20px;
text-decoration:none;
transition:0.3s;
border-radius:5px;
margin:5px 10px;
}

.sidebar a:hover{
background:#334155;
color:white;
transform:translateX(6px);
}

/* HEADER (NEW COLOR) */

.topbar{
background:linear-gradient(90deg,#2563eb,#06b6d4); /* 🔥 new color */
color:white;
padding:12px 20px;
margin-left:220px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

.topbar.full{
margin-left:0;
}

/* CONTENT */

.content{
margin-left:220px;
padding:25px;
transition:0.3s;
}

.content.full{
margin-left:0;
}

/* TOGGLE BUTTON */

.toggle-btn{
font-size:22px;
cursor:pointer;
margin-right:15px;
color:white;
}

/* PROFILE */

.profile-circle{
width:35px;
height:35px;
border-radius:50%;
background:white;
color:#2563eb;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-left:10px;
}

/* DARK MODE */

.dark-mode body{
background:#121212;
color:white;
}

.dark-mode .topbar{
background:#1e293b;
}

.dark-mode .content{
background:#121212;
}

.dark-mode .card{
background:#1e1e1e;
color:white;
}

.dark-mode .sidebar{
background:#020617;
}

/* TOGGLE SWITCH */

.toggle{
width:50px;
height:25px;
background:#ddd;
border-radius:20px;
cursor:pointer;
position:relative;
margin-left:10px;
}

.toggle-circle{
width:20px;
height:20px;
background:white;
border-radius:50%;
position:absolute;
top:2px;
left:3px;
transition:0.3s;
}

.dark-mode .toggle{
background:#555;
}

.dark-mode .toggle-circle{
transform:translateX(22px);
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar" class="sidebar">

<div class="logo" onclick="window.location='/dashboard'">
<img src="{{url_for('static',filename='logo.png')}}">
<h5>AI Signature</h5>
</div>

<a href="/dashboard">📊 Dashboard</a>
<a href="/verify">✍ Verify</a>
<a href="/reports">📄 Reports</a>
<a href="/settings">⚙ Settings</a>
<a href="/logout" class="text-danger">🚪 Logout</a>

</div>

<!-- HEADER -->

<div id="topbar" class="topbar">

<div class="d-flex align-items-center">

<span class="toggle-btn" onclick="toggleSidebar()">☰</span>

<span>Signature Verification System</span>

</div>

<div class="d-flex align-items-center">

<span class="me-3">Welcome {{session["user"]}}</span>

<div class="profile-circle">
{{session["user"][0]|upper}}
</div>

<!-- 🌙 DARK MODE BUTTON -->

<div class="toggle" onclick="toggleDark()">
<div class="toggle-circle"></div>
</div>

</div>

</div>

<!-- CONTENT -->

<div id="content" class="content">

{% block content %}
{% endblock %}

</div>

<script>

/* SIDEBAR */

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("hide");
document.getElementById("content").classList.toggle("full");
document.getElementById("topbar").classList.toggle("full");
}

/* DARK MODE */

function toggleDark(){

document.documentElement.classList.toggle("dark-mode");

if(document.documentElement.classList.contains("dark-mode")){
localStorage.setItem("theme","dark");
}
else{
localStorage.setItem("theme","light");
}

}

</script>

</body>
</html>
