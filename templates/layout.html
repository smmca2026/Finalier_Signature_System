<!DOCTYPE html>
<html>

<head>

<title>Signature Verification System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script>

/* Load dark mode before page render */

if(localStorage.getItem("theme")=="dark"){
document.documentElement.classList.add("dark-mode");
}

</script>

<style>

body{
background:#f4f6f9;
font-family:Arial;
transition:0.4s;
}

/* Sidebar */

.sidebar{
height:100vh;
background:linear-gradient(180deg,#0f172a,#1e293b);
padding-top:20px;
position:fixed;
width:220px;
}

/* Logo */

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{

width:70px;
height:70px;

border-radius:50%;

object-fit:cover;

border:3px solid white;

/* glow animation */

animation:logoGlow 2s infinite alternate;

}

.logo h4{
color:white;
margin-top:10px;
}

/* Logo Glow */

@keyframes logoGlow{

0%{
box-shadow:0 0 5px #3b82f6;
}

50%{
box-shadow:0 0 20px #3b82f6;
}

100%{
box-shadow:0 0 35px #3b82f6;
}

}

/* Sidebar links */

.sidebar a{
display:block;
color:#cbd5e1;
padding:12px 20px;
text-decoration:none;
font-size:15px;
transition:0.3s;
border-radius:5px;
margin:5px 10px;
}

.sidebar a:hover{
background:#334155;
color:white;
transform:translateX(8px);
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

/* Content */

.content{
margin-left:220px;
padding:30px;
}

/* Topbar */

.topbar{
background:white;
padding:12px 25px;
border-bottom:1px solid #ddd;
margin-left:220px;
}

/* Dark Mode */

.dark-mode body{
background:#121212;
color:white;
}

.dark-mode .topbar{
background:#1e1e1e;
color:white;
border-bottom:none;
}

.dark-mode .content{
background:#121212;
}

.dark-mode .card{
background:#1e1e1e;
color:white;
}

.dark-mode .table{
color:white;
}

.dark-mode .sidebar{
background:#020617;
}

/* Toggle Switch */

.toggle-container{
margin-left:10px;
}

.toggle{
position:relative;
width:60px;
height:30px;
background:#ddd;
border-radius:30px;
cursor:pointer;
transition:0.4s;
}

.toggle-circle{
position:absolute;
width:26px;
height:26px;
background:white;
border-radius:50%;
top:2px;
left:2px;
transition:0.4s;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

.dark-mode .toggle{
background:#374151;
}

.dark-mode .toggle-circle{
transform:translateX(30px);
}

/* Profile circle */

.profile-circle{

width:35px;
height:35px;

border-radius:50%;

background:#6366f1;
color:white;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
font-size:14px;

margin-left:10px;

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">

<img src="{{url_for('static',filename='logo.png')}}">

<h4>AI Signature</h4>

</div>

<a href="/dashboard">📊 Dashboard</a>

<a href="/verify">✍ Verify Signature</a>

<a href="/reports">📄 Reports</a>

<a href="/settings">⚙ Settings</a>

<a href="/logout" class="text-danger">🚪 Logout</a>

</div>

<!-- Topbar -->

<div class="topbar d-flex justify-content-between align-items-center">

<span>Signature Verification System</span>

<div class="d-flex align-items-center">

<span class="me-3">
Welcome {{session["user"]}}
</span>

<!-- Profile Circle -->

<div class="profile-circle">
{{session["user"][0]|upper}}
</div>

<!-- Dark Mode Toggle -->

<div class="toggle-container">

<div class="toggle" onclick="toggleDark()">

<div class="toggle-circle" id="toggleIcon">☀</div>

</div>

</div>

</div>

</div>

<!-- Page Content -->

<div class="content">

{% block content %}

{% endblock %}

</div>

<script>

function toggleDark(){

document.documentElement.classList.toggle("dark-mode");

if(document.documentElement.classList.contains("dark-mode")){
localStorage.setItem("theme","dark");
document.getElementById("toggleIcon").innerHTML="🌙";
}
else{
localStorage.setItem("theme","light");
document.getElementById("toggleIcon").innerHTML="☀";
}

}

/* restore icon */

window.onload=function(){

if(localStorage.getItem("theme")=="dark"){
document.getElementById("toggleIcon").innerHTML="🌙";
}

}

</script>

</body>

</html>
