<!DOCTYPE html>
<html>
<head>
    <title>Signature Verification System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Signature Verification</a>
    <div>
      {% if session.get('user') %}
        <span class="text-white me-3">Welcome {{ session['user'] }}</span>
        <a href="/dashboard" class="btn btn-sm btn-light">Dashboard</a>
        <a href="/history" class="btn btn-sm btn-warning">History</a>
        <a href="/logout" class="btn btn-sm btn-danger">Logout</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
