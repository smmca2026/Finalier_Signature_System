<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Signature System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#3b82f6,#06b6d4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', sans-serif;
}

/* Container */
.box{
    width:900px;
    height:450px;
    background:white;
    border-radius:20px;
    display:flex;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* Left */
.left{
    width:40%;
    background:linear-gradient(135deg,#4f46e5,#0ea5e9);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.left button{
    margin-top:20px;
    border:none;
    padding:10px 25px;
    border-radius:20px;
    background:white;
    color:#4f46e5;
    font-weight:bold;
}

/* Right */
.right{
    width:60%;
    padding:30px;
}

.tabs{
    display:flex;
    justify-content:flex-end;
    margin-bottom:20px;
}

.tabs button{
    border:none;
    padding:8px 15px;
    margin-left:10px;
    border-radius:20px;
    background:#e5e7eb;
}

.tabs .active{
    background:#3b82f6;
    color:white;
}

input{
    margin-bottom:10px !important;
    border-radius:10px !important;
}

.btn-custom{
    background:#3b82f6;
    color:white;
    border-radius:20px;
}

</style>
</head>

<body>

<div class="box">

    <!-- LEFT -->
    <div class="left">
        <h2>🤖 AI Signature</h2>
        <p>Signature Verification System</p>
        <button onclick="showLogin()">Login</button>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <!-- FLASH MESSAGE -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-danger">{{msg}}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="tabs">
            <button id="loginTab" class="active" onclick="showLogin()">Login</button>
            <button id="registerTab" onclick="showRegister()">Register</button>
        </div>

        <!-- LOGIN -->
        <form id="loginForm" method="POST" action="/login">

            <input type="text" name="username" class="form-control" placeholder="Username" required>

            <input type="password" name="password" class="form-control" placeholder="Password" required>

            <button type="submit" class="btn btn-custom w-100 mt-2">
                Login
            </button>

        </form>

        <!-- REGISTER -->
        <form id="registerForm" method="POST" action="/register" style="display:none;">

            <input type="text" name="username" class="form-control" placeholder="Username" required>

            <input type="email" name="email" class="form-control" placeholder="Email" required>

            <input type="password" name="password" class="form-control" placeholder="Password" required>

            <button type="submit" class="btn btn-custom w-100 mt-2">
                Register
            </button>

        </form>

    </div>

</div>

<script>

function showLogin(){
    document.getElementById("loginForm").style.display="block";
    document.getElementById("registerForm").style.display="none";

    document.getElementById("loginTab").classList.add("active");
    document.getElementById("registerTab").classList.remove("active");
}

function showRegister(){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("registerForm").style.display="block";

    document.getElementById("registerTab").classList.add("active");
    document.getElementById("loginTab").classList.remove("active");
}

</script>

</body>
</html>
